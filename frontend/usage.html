<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiempoLuarca - Uso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #060d1f;
            --bg2: #0b1530;
            --glass: rgba(15, 25, 55, 0.65);
            --glass-border: rgba(255, 255, 255, 0.07);
            --text: #e8ecf4;
            --text-dim: #7b8ba3;
            --accent: #3b82f6;
            --radius: 16px;
        }
        html { font-size: 16px; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            padding: 1rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
        h2 { font-size: 1.1rem; margin: 1.5rem 0 0.5rem; color: var(--accent); }
        a { color: var(--accent); }
        .back { margin-bottom: 1rem; display: inline-block; font-size: 0.9rem; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin: 1rem 0; }
        .card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 1.2rem;
            text-align: center;
        }
        .card .value { font-size: 2rem; font-weight: 700; color: var(--accent); }
        .card .label { font-size: 0.8rem; color: var(--text-dim); margin-top: 0.3rem; }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th, td {
            padding: 0.5rem 0.7rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        th { color: var(--text-dim); font-weight: 500; }
        .chart {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 1rem;
            margin: 1rem 0;
            overflow-x: auto;
        }
        .bar-row { display: flex; align-items: center; gap: 0.5rem; margin: 0.2rem 0; font-size: 0.8rem; }
        .bar-label { width: 70px; text-align: right; color: var(--text-dim); flex-shrink: 0; }
        .bar { background: var(--accent); height: 20px; border-radius: 4px; min-width: 2px; transition: width 0.3s; }
        .bar-val { color: var(--text-dim); font-size: 0.75rem; flex-shrink: 0; }
        #loading { color: var(--text-dim); padding: 2rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <a class="back" href="/">&larr; Volver</a>
        <h1>Informe de uso</h1>

        <div id="loading">Cargando datos...</div>
        <div id="content" style="display:none">
            <div class="cards">
                <div class="card">
                    <div class="value" id="totalUsers">-</div>
                    <div class="label">Usuarios distintos</div>
                </div>
                <div class="card">
                    <div class="value" id="totalViews">-</div>
                    <div class="label">Visitas totales</div>
                </div>
                <div class="card">
                    <div class="value" id="avgDaily">-</div>
                    <div class="label">Media visitas/dia</div>
                </div>
            </div>

            <h2>Visitas diarias (ultimos 30 dias)</h2>
            <div class="chart" id="dailyChart"></div>

            <h2>Usuarios por frecuencia</h2>
            <table>
                <thead><tr><th>Usuario</th><th>Visitas</th><th>Primera visita</th><th>Ultima visita</th></tr></thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
    </div>

    <script>
    (async () => {
        try {
            const resp = await fetch('api/usage');
            const data = await resp.json();

            document.getElementById('totalUsers').textContent = data.total_usuarios;
            document.getElementById('totalViews').textContent = data.total_visitas;

            const days = data.diario || [];
            const avgDaily = days.length ? Math.round(data.total_visitas / Math.max(days.length, 1)) : 0;
            document.getElementById('avgDaily').textContent = avgDaily;

            // Daily chart
            const maxVisitas = Math.max(...days.map(d => d.visitas), 1);
            const chartEl = document.getElementById('dailyChart');
            chartEl.innerHTML = days.map(d => {
                const pct = (d.visitas / maxVisitas) * 100;
                const dateStr = d.dia.slice(5); // MM-DD
                return `<div class="bar-row">
                    <span class="bar-label">${dateStr}</span>
                    <div class="bar" style="width:${pct}%"></div>
                    <span class="bar-val">${d.visitas} (${d.usuarios}u)</span>
                </div>`;
            }).join('');

            // Users table
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = (data.usuarios || []).map(u => {
                const first = u.primera ? u.primera.slice(0, 10) : '-';
                const last = u.ultima ? u.ultima.slice(0, 10) : '-';
                return `<tr><td>${u.user_hash}</td><td>${u.visitas}</td><td>${first}</td><td>${last}</td></tr>`;
            }).join('');

            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
        } catch (e) {
            document.getElementById('loading').textContent = 'Error cargando datos: ' + e.message;
        }
    })();
    </script>
</body>
</html>
